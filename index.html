<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Procesos — Ministerio de Agricultura</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:13px}
  .topbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:10}
  .topbar-left h1{font-size:16px;font-weight:600;color:#1a1a1a}
  .topbar-left span{font-size:11px;color:#888}
  .main{padding:16px 20px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
  .kpi{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:12px;text-align:center}
  .kpi-label{font-size:11px;color:#888;margin-bottom:4px}
  .kpi-val{font-size:22px;font-weight:600}
  .kpi-val.v{color:#1a9e6e}.kpi-val.r{color:#d94040}.kpi-val.g{color:#888}.kpi-val.b{color:#1a5fba}
  .card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;margin-bottom:16px}
  .tabs{display:flex;border-bottom:1px solid #e8e8e8;background:#fafafa}
  .tab{font-size:13px;padding:10px 20px;cursor:pointer;color:#888;border-bottom:2px solid transparent;font-weight:500}
  .tab.active{color:#1a1a1a;border-bottom-color:#1a5fba;background:#fff}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;align-items:center;border-bottom:1px solid #f0f0f0}
  .toolbar input,.toolbar select{font-size:12px;padding:6px 10px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;outline:none}
  .toolbar input{flex:1;min-width:160px}
  .toolbar input:focus,.toolbar select:focus{border-color:#1a5fba}
  .btn{font-size:12px;padding:6px 14px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-weight:500;transition:background 0.15s}
  .btn:hover{background:#f5f5f5}
  .btn.primary{background:#1a5fba;color:#fff;border-color:#1a5fba}
  .btn.primary:hover{background:#154fa0}
  .btn.danger{color:#d94040;border-color:#f5c0c0}
  .btn.danger:hover{background:#fff5f5}
  .btn.sm{padding:4px 8px;font-size:11px}
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:800px}
  th{padding:9px 12px;text-align:left;font-weight:600;font-size:11px;color:#888;background:#fafafa;border-bottom:1px solid #eee;white-space:nowrap;text-transform:uppercase;letter-spacing:0.03em}
  td{padding:9px 12px;border-bottom:1px solid #f0f0f0;vertical-align:top}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#fafeff}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:2px}
  .dot-v{background:#1a9e6e}.dot-r{background:#d94040}.dot-g{background:#bbb}
  .badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap}
  .be{background:#ddeeff;color:#0a4080}
  .bd{background:#ffe0e0;color:#8b0000}
  .bds{background:#efefef;color:#555}
  .bro{background:#e8f5e9;color:#1b5e20}
  .bev{background:#ede7f6;color:#4527a0}
  .badj{background:#e8f5e9;color:#1b5e20}
  .bej{background:#e3f2fd;color:#0d47a1}
  .prov-list{display:flex;flex-direction:column;gap:2px}
  .prov-item{font-size:11px;color:#555;padding:1px 0}
  .empty{text-align:center;padding:3rem;color:#aaa;font-size:13px}
  .loading{text-align:center;padding:2rem;color:#888;font-size:13px}
  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none}
  .toast.show{opacity:1}
  /* MODAL */
  .mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
  .mbg.open{display:flex}
  .modal{background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:20px;width:620px;max-width:100%;margin:auto}
  .modal h2{font-size:15px;font-weight:600;margin-bottom:16px;color:#1a1a1a}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .fg{display:flex;flex-direction:column;gap:4px}
  .fg.full{grid-column:1/-1}
  .fg label{font-size:11px;color:#888;font-weight:500}
  .fg input,.fg select,.fg textarea{font-size:12px;padding:7px 10px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#1a1a1a;outline:none}
  .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#1a5fba}
  .fg textarea{resize:vertical;min-height:56px}
  .sec-hdr{font-size:10px;font-weight:700;color:#aaa;margin:4px 0 0;grid-column:1/-1;border-top:1px solid #f0f0f0;padding-top:12px;text-transform:uppercase;letter-spacing:0.06em}
  .mfooter{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
  .prov-entry{display:flex;gap:6px;align-items:center;margin-bottom:5px}
  .prov-entry input{flex:1}
  .status-bar{font-size:11px;color:#888;padding:6px 16px;background:#fafafa;border-top:1px solid #f0f0f0}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>📋 Base de Control de Procesos</h1>
    <span>Ministerio de Agricultura · Departamento de Compras y Contrataciones · 2026</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="syncStatus" style="font-size:11px;color:#aaa"></span>
    <button class="btn primary" onclick="openModal()">+ Nuevo proceso</button>
  </div>
</div>

<div class="main">
  <div class="kpis" id="kpis">
    <div class="kpi"><div class="kpi-label">Cargando...</div><div class="kpi-val g">—</div></div>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('elaboracion',this)">En elaboración</div>
      <div class="tab" onclick="switchTab('activos',this)">Procesos activos</div>
    </div>
    <div class="toolbar">
      <input type="text" id="buscar" placeholder="Buscar oficio, nombre o área..." oninput="render()">
      <select id="fAnalista" onchange="render()"><option value="">Todos los analistas</option></select>
      <select id="fVice" onchange="render()"><option value="">Todos los viceministerios</option></select>
      <select id="fEstatus" onchange="render()"><option value="">Todos los estatus</option></select>
    </div>
    <div class="tbl-wrap" id="tblWrap"><div class="loading">Conectando con la base de datos...</div></div>
    <div class="status-bar" id="statusBar"></div>
  </div>
</div>

<!-- MODAL -->
<div class="mbg" id="mbg">
  <div class="modal">
    <h2 id="mTitle">Nuevo proceso</h2>
    <div class="fgrid" id="mForm"></div>
    <div class="mfooter">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn primary" id="btnGuardar" onclick="saveProc()">Guardar proceso</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore, collection, onSnapshot,
  addDoc, updateDoc, deleteDoc, doc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5FT3yaeUfuA4tGEG4vXIOe7jTyq4VZ6M",
  authDomain: "compras-agricultura-2026.firebaseapp.com",
  projectId: "compras-agricultura-2026",
  storageBucket: "compras-agricultura-2026.firebasestorage.app",
  messagingSenderId: "821679458499",
  appId: "1:821679458499:web:ab0a091f82fb7e980ffa76"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ANALISTAS=['Alicia Castillo','Arianny Santos','Crismel Jean-Baptiste','Geovanna Silie','John Ortiz','Mario Peña','Mercedes Jimenez','Nicauly Rincon','Olga Martinez','Rikenny Encarnacion','Warda Simo'];
const VICES=['VICEMINISTERIO ADMINISTRATIVO, TÉCNICO Y FINANCIERO','VICE-MINISTERIO DE PRODUCCIÓN AGRÍCOLA Y MERCADEO','VICEMINISTERIO DE EXTENSIÓN Y CAPACITACIÓN AGROPECUARIA','VICE-MINISTERIO DE DESARROLLO RURAL AGROPECUARIO','DESPACHO DEL MINISTRO','VICEMINISTERIO DE PLANIFICACION Y DESARROLLO'];
const ESTATUS_ELAB=['EN ELABORACION','DEVUELTO','DESIERTO','PUBLICADO'];
const ESTATUS_ACT=['EN RECEPCION DE OFERTAS','EVALUACION DE OFERTAS','ADJUDICADO','EN EJECUCION'];
const MODALIDADES=['CONTRATACION MENOR','CONTRATACION DIRECTA SUJETA AL UMBRAL','PROVEEDOR UNICO','CONTRATACION SIMPLIFICADA','LICITACION PUBLICA','LICITACION RESTRINGIDA'];
const TIPOS_COMPRA=['OPERACIONAL','MISIONAL'];

let tab='elaboracion';
let editId=null;
let elab=[], activos=[];

// Realtime listeners
onSnapshot(collection(db,'elaboracion'), snap=>{
  elab=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(tab==='elaboracion'){populateFiltros();render();}
  renderKPIs();
  setSyncStatus('✓ Sincronizado');
});
onSnapshot(collection(db,'activos'), snap=>{
  activos=snap.docs.map(d=>({id:d.id,...d.data()}));
  if(tab==='activos'){populateFiltros();render();}
  renderKPIs();
  setSyncStatus('✓ Sincronizado');
});

function setSyncStatus(msg){
  const el=document.getElementById('syncStatus');
  if(el){el.textContent=msg;setTimeout(()=>el.textContent='',3000);}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function fmt(n){
  const v=parseFloat(String(n||'0').replace(/,/g,''));
  if(isNaN(v)||v===0) return '—';
  return 'RD$ '+v.toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function semClass(est,tipo){
  if(tipo==='elaboracion'){
    return est==='EN ELABORACION'?'dot-g':(est==='DEVUELTO'||est==='DESIERTO'?'dot-r':'dot-g');
  }
  return (est==='ADJUDICADO'||est==='EN EJECUCION')?'dot-v':'dot-g';
}

function badgeElab(est){
  return est==='EN ELABORACION'?'be':est==='DEVUELTO'?'bd':'bds';
}
function badgeAct(est){
  const m={'EN RECEPCION DE OFERTAS':'bro','EVALUACION DE OFERTAS':'bev','ADJUDICADO':'badj','EN EJECUCION':'bej'};
  return m[est]||'bro';
}

function renderKPIs(){
  const enElab=elab.filter(p=>p.estatus==='EN ELABORACION').length;
  const prob=elab.filter(p=>p.estatus==='DEVUELTO'||p.estatus==='DESIERTO').length;
  const totalA=activos.length;
  const adj=activos.filter(p=>p.estatus==='ADJUDICADO').length;
  const monto=[...elab,...activos].reduce((s,p)=>s+parseFloat(String(p.monto||'0').replace(/,/g,'')||0),0);
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="kpi-label">En elaboración</div><div class="kpi-val g">${enElab}</div></div>
    <div class="kpi"><div class="kpi-label">Dev. / Desierto</div><div class="kpi-val r">${prob}</div></div>
    <div class="kpi"><div class="kpi-label">Procesos activos</div><div class="kpi-val v">${totalA}</div></div>
    <div class="kpi"><div class="kpi-label">Adjudicados</div><div class="kpi-val b">${adj}</div></div>
    <div class="kpi"><div class="kpi-label">Monto total (RD$)</div><div class="kpi-val" style="font-size:13px;padding-top:4px">${monto.toLocaleString('es-DO',{maximumFractionDigits:0})}</div></div>
  `;
}

function filtered(){
  const q=document.getElementById('buscar').value.toLowerCase();
  const fA=document.getElementById('fAnalista').value;
  const fV=document.getElementById('fVice').value;
  const fE=document.getElementById('fEstatus').value;
  const datos=tab==='elaboracion'?elab:activos;
  return datos.filter(p=>{
    const txt=(p.oficio+' '+p.nombre+' '+(p.area||'')).toLowerCase();
    return(!q||txt.includes(q))&&(!fA||p.analista===fA)&&(!fV||p.vice===fV)&&(!fE||p.estatus===fE);
  });
}

function populateFiltros(){
  const datos=tab==='elaboracion'?elab:activos;
  const fA=document.getElementById('fAnalista');
  const fV=document.getElementById('fVice');
  const fE=document.getElementById('fEstatus');
  const sA=fA.value,sV=fV.value,sE=fE.value;
  const analistas=[...new Set(datos.map(p=>p.analista).filter(Boolean))].sort();
  const vices=[...new Set(datos.map(p=>p.vice).filter(Boolean))].sort();
  const estatus=[...new Set(datos.map(p=>p.estatus).filter(Boolean))];
  fA.innerHTML='<option value="">Todos los analistas</option>'+analistas.map(a=>`<option value="${a}"${a===sA?' selected':''}>${a}</option>`).join('');
  fV.innerHTML='<option value="">Todos los viceministerios</option>'+vices.map(v=>`<option value="${v}"${v===sV?' selected':''}>${v}</option>`).join('');
  fE.innerHTML='<option value="">Todos los estatus</option>'+estatus.map(e=>`<option value="${e}"${e===sE?' selected':''}>${e}</option>`).join('');
}

window.render=function(){
  const rows=filtered();
  const w=document.getElementById('tblWrap');
  document.getElementById('statusBar').textContent=`${rows.length} proceso(s) encontrado(s)`;
  if(!rows.length){w.innerHTML=`<div class="empty">No se encontraron procesos con los filtros actuales.</div>`;return;}

  if(tab==='elaboracion'){
    w.innerHTML=`<table>
      <thead><tr>
        <th></th><th>Oficio</th><th>Fecha recibido</th><th>Viceministerio</th><th>Área requirente</th>
        <th>Analista</th><th>Nombre del proceso</th><th>Monto estimado</th>
        <th>Estatus</th><th>Tipo</th><th>Trim.</th><th>Observaciones</th><th>Acciones</th>
      </tr></thead>
      <tbody>${rows.map(p=>`<tr>
        <td><span class="dot ${semClass(p.estatus,'elaboracion')}"></span></td>
        <td style="white-space:nowrap;font-weight:600">${p.oficio||'—'}</td>
        <td style="white-space:nowrap">${p.fechaRecibido||'—'}</td>
        <td style="max-width:140px;font-size:11px;color:#555">${p.vice||'—'}</td>
        <td style="max-width:130px;font-size:11px;color:#555">${p.area||'—'}</td>
        <td style="white-space:nowrap">${p.analista||'—'}</td>
        <td style="max-width:200px">${p.nombre||'—'}</td>
        <td style="white-space:nowrap">${fmt(p.monto)}</td>
        <td><span class="badge ${badgeElab(p.estatus)}">${p.estatus||'—'}</span></td>
        <td><span style="font-size:11px;color:#888">${p.tipoCompra||'—'}</span></td>
        <td style="text-align:center;color:#888">${p.trimestre||'—'}</td>
        <td style="max-width:180px;font-size:11px;color:#888">${p.obs||'—'}</td>
        <td style="white-space:nowrap">
          <button class="btn sm" onclick="editProc('${p.id}')">✏️</button>
          <button class="btn sm danger" onclick="delProc('${p.id}','elaboracion')">🗑️</button>
        </td>
      </tr>`).join('')}</tbody></table>`;
  } else {
    w.innerHTML=`<table>
      <thead><tr>
        <th></th><th>Oficio</th><th>Referencia</th><th>Viceministerio</th><th>Área requirente</th>
        <th>Analista</th><th>Nombre del proceso</th><th>Fecha pub.</th><th>Modalidad</th>
        <th>Monto estimado</th><th>Estatus</th><th>Proveedores adjudicados</th>
        <th>Contrato</th><th>Inicio</th><th>Fin</th><th>Observaciones</th><th>Acciones</th>
      </tr></thead>
      <tbody>${rows.map(p=>`<tr>
        <td><span class="dot ${semClass(p.estatus,'activos')}"></span></td>
        <td style="white-space:nowrap;font-weight:600">${p.oficio||'—'}</td>
        <td style="white-space:nowrap;font-size:11px;color:#555">${p.referencia||'—'}</td>
        <td style="max-width:130px;font-size:11px;color:#555">${p.vice||'—'}</td>
        <td style="max-width:120px;font-size:11px;color:#555">${p.area||'—'}</td>
        <td style="white-space:nowrap">${p.analista||'—'}</td>
        <td style="max-width:180px">${p.nombre||'—'}</td>
        <td style="white-space:nowrap">${p.fechaPub||'—'}</td>
        <td style="font-size:11px">${p.modalidad||'—'}</td>
        <td style="white-space:nowrap">${fmt(p.monto)}</td>
        <td><span class="badge ${badgeAct(p.estatus)}">${p.estatus||'—'}</span></td>
        <td>${p.proveedores&&p.proveedores.length?`<div class="prov-list">${p.proveedores.map(v=>`<div class="prov-item">· ${v}</div>`).join('')}</div>`:'—'}</td>
        <td style="text-align:center"><span class="badge ${p.contrato==='SI'?'badj':'bds'}">${p.contrato||'NO'}</span></td>
        <td style="white-space:nowrap;font-size:11px">${p.inicioContrato||'—'}</td>
        <td style="white-space:nowrap;font-size:11px">${p.finContrato||'—'}</td>
        <td style="max-width:150px;font-size:11px;color:#888">${p.obs||'—'}</td>
        <td style="white-space:nowrap">
          <button class="btn sm" onclick="editProc('${p.id}')">✏️</button>
          <button class="btn sm danger" onclick="delProc('${p.id}','activos')">🗑️</button>
        </td>
      </tr>`).join('')}</tbody></table>`;
  }
}

window.switchTab=function(t,el){
  tab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  populateFiltros();render();
}

window.openModal=function(clear=true){
  if(clear){editId=null;document.getElementById('mTitle').textContent='Nuevo proceso';buildForm(null);}
  document.getElementById('mbg').classList.add('open');
}
window.closeModal=function(){document.getElementById('mbg').classList.remove('open');}

window.editProc=function(id){
  const arr=tab==='elaboracion'?elab:activos;
  const p=arr.find(x=>x.id===id);
  if(!p)return;
  editId=id;
  document.getElementById('mTitle').textContent='Editar proceso';
  buildForm(p);
  document.getElementById('mbg').classList.add('open');
}

window.delProc=async function(id,colName){
  if(!confirm('¿Eliminar este proceso? Esta acción no se puede deshacer.'))return;
  await deleteDoc(doc(db,colName,id));
  showToast('Proceso eliminado');
}

window.addProv=function(){
  const list=document.getElementById('provList');
  const idx=list.children.length;
  const d=document.createElement('div');
  d.className='prov-entry';d.id='pe'+idx;
  d.innerHTML=`<input placeholder="Nombre del proveedor" style="flex:1;font-size:12px;padding:7px 10px;border-radius:7px;border:1px solid #ddd">
    <button class="btn sm danger" onclick="removeProv(${idx})" type="button">✕</button>`;
  list.appendChild(d);
}
window.removeProv=function(i){const el=document.getElementById('pe'+i);if(el)el.remove();}

function getProveedores(){
  const list=document.getElementById('provList');
  if(!list)return[];
  return Array.from(list.querySelectorAll('input')).map(i=>i.value.trim()).filter(Boolean);
}

function buildForm(p){
  const isAct=tab==='activos';
  const provs=(p&&p.proveedores&&p.proveedores.length)?p.proveedores:[''];
  const provHTML=`<div id="provList">${provs.map((pv,i)=>`
    <div class="prov-entry" id="pe${i}">
      <input value="${pv}" placeholder="Nombre del proveedor" style="flex:1;font-size:12px;padding:7px 10px;border-radius:7px;border:1px solid #ddd">
      <button class="btn sm danger" onclick="removeProv(${i})" type="button">✕</button>
    </div>`).join('')}</div>
  <button class="btn sm" onclick="addProv()" type="button" style="margin-top:5px">+ Agregar proveedor</button>`;

  document.getElementById('mForm').innerHTML=`
    <div class="fg"><label>No. Oficio *</label><input id="fOficio" value="${(p&&p.oficio)||''}"></div>
    <div class="fg"><label>Fecha recibido</label><input id="fFechaRec" value="${(p&&p.fechaRecibido)||''}"></div>
    <div class="fg full"><label>Viceministerio</label><select id="fVice2">${VICES.map(v=>`<option${p&&p.vice===v?' selected':''}>${v}</option>`).join('')}</select></div>
    <div class="fg full"><label>Área requirente</label><input id="fArea" value="${(p&&p.area)||''}"></div>
    <div class="fg"><label>Analista</label><select id="fAnalista2">${ANALISTAS.map(a=>`<option${p&&p.analista===a?' selected':''}>${a}</option>`).join('')}</select></div>
    <div class="fg"><label>Referencia del proceso</label><input id="fRef" value="${(p&&p.referencia)||''}"></div>
    <div class="fg full"><label>Nombre del proceso *</label><input id="fNombre" value="${(p&&p.nombre)||''}"></div>
    <div class="fg"><label>Monto estimado (RD$)</label><input id="fMonto" type="number" value="${(p&&p.monto)||''}"></div>
    <div class="fg"><label>MIPYME</label><input id="fMipyme" value="${(p&&p.mipyme)||''}"></div>
    <div class="fg"><label>Trimestre</label>
      <select id="fTrimestre"><option value="">—</option>${['1','2','3','4'].map(t=>`<option${p&&p.trimestre===t?' selected':''}>${t}</option>`).join('')}</select>
    </div>
    ${isAct?`
    <div class="sec-hdr">Publicación y adjudicación</div>
    <div class="fg"><label>Modalidad</label><select id="fModal">${MODALIDADES.map(m=>`<option${p&&p.modalidad===m?' selected':''}>${m}</option>`).join('')}</select></div>
    <div class="fg"><label>Fecha de publicación</label><input id="fFechaPub" value="${(p&&p.fechaPub)||''}"></div>
    <div class="fg"><label>Estatus</label><select id="fEstatus2">${ESTATUS_ACT.map(e=>`<option${p&&p.estatus===e?' selected':''}>${e}</option>`).join('')}</select></div>
    <div class="fg"><label>Contrato</label><select id="fContrato"><option${!p||p.contrato==='NO'?' selected':''}>NO</option><option${p&&p.contrato==='SI'?' selected':''}>SI</option></select></div>
    <div class="fg"><label>Inicio de contrato</label><input id="fInicioC" value="${(p&&p.inicioContrato)||''}"></div>
    <div class="fg"><label>Fin de contrato</label><input id="fFinC" value="${(p&&p.finContrato)||''}"></div>
    <div class="fg full"><label>Proveedores adjudicados</label>${provHTML}</div>
    `:`
    <div class="fg"><label>Estatus</label><select id="fEstatus2">${ESTATUS_ELAB.map(e=>`<option${p&&p.estatus===e?' selected':''}>${e}</option>`).join('')}</select></div>
    <div class="fg"><label>Tipo de compra</label><select id="fTipo">${TIPOS_COMPRA.map(t=>`<option${p&&p.tipoCompra===t?' selected':''}>${t}</option>`).join('')}</select></div>
    `}
    <div class="fg full"><label>Observaciones</label><textarea id="fObs">${(p&&p.obs)||''}</textarea></div>
  `;
}

window.saveProc=async function(){
  const btn=document.getElementById('btnGuardar');
  btn.disabled=true;btn.textContent='Guardando...';
  const isAct=tab==='activos';
  const oficio=document.getElementById('fOficio').value.trim();
  const nombre=document.getElementById('fNombre').value.trim();
  if(!oficio||!nombre){alert('El oficio y el nombre del proceso son requeridos.');btn.disabled=false;btn.textContent='Guardar proceso';return;}

  const base={
    oficio,nombre,
    fechaRecibido:document.getElementById('fFechaRec').value.trim(),
    vice:document.getElementById('fVice2').value,
    area:document.getElementById('fArea').value.trim(),
    analista:document.getElementById('fAnalista2').value,
    referencia:document.getElementById('fRef').value.trim(),
    monto:document.getElementById('fMonto').value||'0',
    mipyme:document.getElementById('fMipyme').value.trim(),
    trimestre:document.getElementById('fTrimestre').value,
    estatus:document.getElementById('fEstatus2').value,
    obs:document.getElementById('fObs').value.trim(),
    updatedAt:serverTimestamp()
  };

  try{
    if(isAct){
      const datos={...base,
        modalidad:document.getElementById('fModal').value,
        fechaPub:document.getElementById('fFechaPub').value.trim(),
        contrato:document.getElementById('fContrato').value,
        inicioContrato:document.getElementById('fInicioC').value.trim(),
        finContrato:document.getElementById('fFinC').value.trim(),
        proveedores:getProveedores(),
      };
      if(editId) await updateDoc(doc(db,'activos',editId),datos);
      else await addDoc(collection(db,'activos'),{...datos,createdAt:serverTimestamp()});
    } else {
      const datos={...base,tipoCompra:document.getElementById('fTipo').value};
      if(datos.estatus==='PUBLICADO'){
        // Mover a activos automáticamente
        const datosActivo={...datos,
          modalidad:'',fechaPub:'',contrato:'NO',
          inicioContrato:'',finContrato:'',proveedores:[],
          movidoDeElaboracion:true,createdAt:serverTimestamp()
        };
        await addDoc(collection(db,'activos'),datosActivo);
        if(editId) await deleteDoc(doc(db,'elaboracion',editId));
        showToast('Proceso publicado y movido a Activos ✓');
      } else {
        if(editId) await updateDoc(doc(db,'elaboracion',editId),datos);
        else await addDoc(collection(db,'elaboracion'),{...datos,createdAt:serverTimestamp()});
      }
    }
    closeModal();
    showToast(editId?'Proceso actualizado ✓':'Proceso creado ✓');
  }catch(e){
    alert('Error al guardar: '+e.message);
  }
  btn.disabled=false;btn.textContent='Guardar proceso';
}

</script>
</body>
</html>
